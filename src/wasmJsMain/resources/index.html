<!doctype html>
<html lang="en">
<head>
    <title>bf</title>
    <style>
        textarea {
            width: 100%;
                background: #252526;
                color: #d4d4d4;
                border: 1px solid #333;
                font-family: monospace;
                font-size: 14px;
        }

        body {
            background: #1e1e1e;
            color: #d4d4d4;
        }
    </style>
</head>
<body>
<textarea id="code" rows="10">++++++++++[>+++++++>++++++++++>+++>+<<<<-]>++.>+.+++++++..+++.>++.<<+++++++++++++++.>.+++.------.--------.>+.>.</textarea>
<br/>
<button id="run">Run</button>
<label><input id="optimise" type="checkbox" checked/> Optimise</label>
<label><input id="strip" type="checkbox" checked/> Strip</label>
<br/>
<textarea id="output" rows="40" readonly style="width: 100%"></textarea>
<small id="time"></small>
<script type="module">
    const codeEl = document.getElementById('code');
    const optimiseEl = document.getElementById('optimise');
    const stripEl = document.getElementById('strip');
    const outputEl = document.getElementById('output');
    const runBtn = document.getElementById('run');
    const timeEl = document.getElementById('time');
    const instantiateUrl = new URL("./bf.uninstantiated.mjs", import.meta.url).href;

    runBtn.disabled = true;
    timeEl.textContent = "Loading runtime...";

    // language=js
    const workerSource = `
        let runtimePromise = null;
        let wasmExports = null;
        let compiledHandle = 0;
        let compiledKey = "";
        let activeRunId = 0;
        let outputMode = "message";
        let outputData = null;
        let outputCtl = null;
        let outputCapacity = 0;

        const CTRL_WRITE = 0;
        const CTRL_READ = 1;
        const CTRL_DONE = 2;

        function errorMessage(err) {
            if (err && typeof err.message === "string") return err.message;
            return String(err);
        }

        function configureOutput(mode, dataBuffer, ctlBuffer) {
            outputMode = mode === "sab" ? "sab" : "message";
            if (outputMode === "sab") {
                outputData = new Uint8Array(dataBuffer);
                outputCtl = new Int32Array(ctlBuffer);
                outputCapacity = outputData.length;
                Atomics.store(outputCtl, CTRL_WRITE, 0);
                Atomics.store(outputCtl, CTRL_READ, 0);
                Atomics.store(outputCtl, CTRL_DONE, 0);
            } else {
                outputData = null;
                outputCtl = null;
                outputCapacity = 0;
            }
        }

        function writeByte(v) {
            const byte = v & 0xff;
            if (outputMode === "message") {
                self.postMessage({type: "out", id: activeRunId, byte});
                return;
            }

            while (true) {
                const write = Atomics.load(outputCtl, CTRL_WRITE);
                const read = Atomics.load(outputCtl, CTRL_READ);
                if (write - read < outputCapacity) {
                    outputData[write % outputCapacity] = byte;
                    Atomics.store(outputCtl, CTRL_WRITE, write + 1);
                    return;
                }
                Atomics.wait(outputCtl, CTRL_READ, read, 10);
            }
        }

        async function initRuntime(instantiateUrl) {
            if (runtimePromise) return runtimePromise;
            runtimePromise = (async () => {
                const binaryenUrl = "https://cdn.jsdelivr.net/npm/binaryen@125.0.0/index.js";
                const binaryenNs = await import(binaryenUrl);
                const {instantiate} = await import(instantiateUrl);
                const {exports} = await instantiate({
                    bf: {
                        read: () => -1,
                        write: (v) => writeByte(v | 0),
                        flush: () => {}
                    },
                    binaryen: binaryenNs
                });
                if (typeof exports.compileProgram !== "function" || typeof exports.executeProgram !== "function") {
                    throw new Error("Missing compileProgram/executeProgram exports");
                }
                wasmExports = exports;
                return true;
            })();
            return runtimePromise;
        }

        self.onmessage = async (event) => {
            const msg = event.data;
            try {
                if (msg.type === "init") {
                    await initRuntime(msg.instantiateUrl);
                    self.postMessage({type: "ready", id: msg.id});
                    return;
                }

                if (msg.type === "reset") {
                    if (wasmExports && typeof wasmExports.clearProgramCache === "function") {
                        wasmExports.clearProgramCache();
                    }
                    compiledHandle = 0;
                    compiledKey = "";
                    self.postMessage({type: "reset-done", id: msg.id});
                    return;
                }

                if (msg.type !== "run") {
                    self.postMessage({type: "error", id: msg.id, message: "Unknown worker message: " + msg.type});
                    return;
                }

                await initRuntime(msg.instantiateUrl);
                const workerStart = performance.now();

                const key = (msg.optimise ? "1" : "0") + "|" + (msg.strip ? "1" : "0") + "|" + msg.code;
                activeRunId = msg.id;
                configureOutput(msg.outputMode, msg.outputDataBuffer, msg.outputCtlBuffer);

                let compileMs = 0;
                if (key !== compiledKey) {
                    const compileStart = performance.now();
                    compiledHandle = wasmExports.compileProgram(msg.code, !!msg.optimise, !!msg.strip);
                    compileMs = performance.now() - compileStart;
                    compiledKey = key;
                }

                const runStart = performance.now();
                wasmExports.executeProgram(compiledHandle);
                const runMs = performance.now() - runStart;
                if (outputMode === "sab") {
                    Atomics.store(outputCtl, CTRL_DONE, 1);
                    Atomics.notify(outputCtl, CTRL_READ, 1);
                }
                const workerTotalMs = performance.now() - workerStart;
                self.postMessage({type: "done", id: msg.id, compileMs, runMs, workerTotalMs});
            } catch (err) {
                self.postMessage({type: "error", id: msg.id, message: errorMessage(err)});
                console.error("Worker error:", err);
            }
        };
    `;

    const workerUrl = URL.createObjectURL(
        new Blob([workerSource], { type: "text/javascript" })
    );

    const worker = new Worker(workerUrl, {type: "module"});
    let workerReady = false;
    let running = false;
    let currentRequestId = 0;
    let currentRunUsesSab = false;
    let currentOutputData = null;
    let currentOutputCtl = null;
    let drainRafId = 0;
    let pendingDoneMessage = null;
    let outputDecoder = new TextDecoder();

    const CTRL_WRITE = 0;
    const CTRL_READ = 1;
    const CTRL_DONE = 2;
    const OUTPUT_BUFFER_SIZE = 1024 * 1024;
    const supportsSab = typeof SharedArrayBuffer === "function" && globalThis.crossOriginIsolated === true;

    function finishRun(doneMsg) {
        if (doneMsg == null) return;
        running = false;
        runBtn.disabled = false;
        outputEl.value += outputDecoder.decode();
        const compileLabel = doneMsg.compileMs > 0.0 ? `${doneMsg.compileMs.toFixed(2)} ms` : "cached";
        timeEl.textContent = `Total: ${doneMsg.workerTotalMs.toFixed(2)} ms | Worker compile: ${compileLabel} | Worker execute: ${doneMsg.runMs.toFixed(2)} ms`;
    }

    function drainSabOutputAndMaybeFinish() {
        drainRafId = 0;

        if (!currentRunUsesSab || currentOutputData == null || currentOutputCtl == null) {
            if (pendingDoneMessage != null) {
                const msg = pendingDoneMessage;
                pendingDoneMessage = null;
                finishRun(msg);
            }
            return;
        }

        const write = Atomics.load(currentOutputCtl, CTRL_WRITE);
        let read = Atomics.load(currentOutputCtl, CTRL_READ);
        let text = "";
        while (read < write) {
            const index = read % OUTPUT_BUFFER_SIZE;
            const chunk = Math.min(write - read, OUTPUT_BUFFER_SIZE - index);
            const decodeChunk = new Uint8Array(chunk);
            decodeChunk.set(currentOutputData.subarray(index, index + chunk));
            text += outputDecoder.decode(decodeChunk, {stream: true});
            read += chunk;
        }
        if (text.length > 0) {
            outputEl.value += text;
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        Atomics.store(currentOutputCtl, CTRL_READ, read);
        Atomics.notify(currentOutputCtl, CTRL_READ, 1);

        if (pendingDoneMessage != null) {
            const done = Atomics.load(currentOutputCtl, CTRL_DONE) === 1;
            const drained = Atomics.load(currentOutputCtl, CTRL_READ) === Atomics.load(currentOutputCtl, CTRL_WRITE);
            if (done && drained) {
                const msg = pendingDoneMessage;
                pendingDoneMessage = null;
                finishRun(msg);
                return;
            }
        }

        if (running || pendingDoneMessage != null) {
            drainRafId = requestAnimationFrame(drainSabOutputAndMaybeFinish);
        }
    }

    worker.onmessage = (event) => {
        const msg = event.data;
        if (msg.id !== undefined && msg.id !== currentRequestId && msg.type !== "ready") {
            return;
        }

        if (msg.type === "ready") {
            workerReady = true;
            runBtn.disabled = false;
            timeEl.textContent = "Runtime ready";
            return;
        }

        if (msg.type === "out") {
            outputEl.value += String.fromCharCode(msg.byte);
            outputEl.scrollTop = outputEl.scrollHeight;
            return;
        }

        if (msg.type === "done") {
            if (currentRunUsesSab) {
                pendingDoneMessage = msg;
                if (drainRafId === 0) {
                    drainRafId = requestAnimationFrame(drainSabOutputAndMaybeFinish);
                }
            } else {
                finishRun(msg);
            }
            return;
        }

        if (msg.type === "error") {
            running = false;
            runBtn.disabled = !workerReady;
            pendingDoneMessage = null;
            if (outputEl.value.length !== 0 && !outputEl.value.endsWith('\n')) {
                outputEl.value += "\n";
            }
            outputEl.value += `[worker error] ${msg.message}\n`;
            timeEl.textContent = "Run failed";
        }
    };

    runBtn.addEventListener('click', () => {
        if (!workerReady || running) {
            return;
        }

        outputEl.value = "";
        outputDecoder = new TextDecoder();
        pendingDoneMessage = null;
        running = true;
        runBtn.disabled = true;
        currentRequestId += 1;
        currentRunUsesSab = supportsSab;
        if (currentRunUsesSab) {
            currentOutputData = new Uint8Array(new SharedArrayBuffer(OUTPUT_BUFFER_SIZE));
            currentOutputCtl = new Int32Array(new SharedArrayBuffer(Int32Array.BYTES_PER_ELEMENT * 3));
            Atomics.store(currentOutputCtl, CTRL_WRITE, 0);
            Atomics.store(currentOutputCtl, CTRL_READ, 0);
            Atomics.store(currentOutputCtl, CTRL_DONE, 0);
            if (drainRafId !== 0) {
                cancelAnimationFrame(drainRafId);
                drainRafId = 0;
            }
            drainRafId = requestAnimationFrame(drainSabOutputAndMaybeFinish);
        } else {
            currentOutputData = null;
            currentOutputCtl = null;
        }
        timeEl.textContent = currentRunUsesSab ? "Running (shared buffer)..." : "Running (fallback mode)...";

        worker.postMessage({
            type: "run",
            id: currentRequestId,
            instantiateUrl,
            code: codeEl.value,
            optimise: optimiseEl.checked,
            strip: stripEl.checked,
            outputMode: currentRunUsesSab ? "sab" : "message",
            outputDataBuffer: currentRunUsesSab ? currentOutputData.buffer : null,
            outputCtlBuffer: currentRunUsesSab ? currentOutputCtl.buffer : null
        });
    });

    currentRequestId += 1;
    worker.postMessage({
        type: "init",
        id: currentRequestId,
        instantiateUrl
    });

    window.addEventListener("beforeunload", () => {
        if (drainRafId !== 0) {
            cancelAnimationFrame(drainRafId);
        }
        worker.terminate();
        URL.revokeObjectURL(workerUrl);
    });
</script>
</body>
</html>
