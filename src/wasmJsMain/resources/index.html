<!doctype html>
<html lang="en">
<head>
    <title>bf</title>
    <script>
        const {origin, pathname, search, hash} = window.location;
        const basePath = pathname.endsWith("/") ? pathname : (pathname + "/");
        const base = document.createElement("base");
        base.href = origin + basePath;
        document.head.appendChild(base);

        if (pathname.length > 1 && pathname.endsWith("/")) {
            const noSlash = pathname.slice(0, -1);
            window.history.replaceState({}, document.title, noSlash + search + hash);
        }
    </script>
    <style>
        textarea {
            width: 100%;
            resize: vertical;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
            box-sizing: border-box;
            background-color: #23272a;
            color: #eee;
            border: 1px solid #444;

            white-space: pre;
            overflow-x: scroll;
            overflow-y: scroll;
        }

        #output {
            flex: 1;
            resize: none;
        }

        textarea:focus {
            outline: none;
            border-color: #66aaff;
        }
        body {
            background: #181a1b;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: #eee;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            padding: 0.5em;
            box-sizing: border-box;
            gap: 0.5em;
        }
        small {
            color: #bbb;
        }
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5em 1em;
            background: transparent;
            color: inherit;
            border: 1px solid #444;
            cursor: pointer;
        }
        button:hover, button:focus {
            outline: none;
            background-color: rgba(0, 0, 0, 0.15);
        }
    </style>
    <script src="./coop.js"></script>
</head>
<body>
<textarea id="code" rows="10">++++++++++[>+++++++>++++++++++>+++>+<<<<-]>++.>+.+++++++..+++.>++.<<+++++++++++++++.>.+++.------.--------.>+.>.</textarea>
<div id="ctrls" style="display: flex; align-items: center; gap: 1em">
    <button id="run">Run</button>
    <button id="export">Export</button>
    <label><input id="optimise" type="checkbox" checked/> Optimise</label>
    <label><input id="strip" type="checkbox" checked/> Strip</label>
    <small id="time" style="position: absolute; right: 1em"></small>
</div>
<textarea id="output" rows="40" readonly style="width: 100%"></textarea>
<script>
    const instructions = "><+-.,[]";
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
        const binary = atob(code);

        let bits = "";
        for (let i = 0; i < binary.length; i++) {
            bits += binary.charCodeAt(i).toString(2).padStart(8, "0");
        }

        let output = "";
        for (let i = 0; i + 2 < bits.length; i += 3) {
            const value = parseInt(bits.slice(i, i + 3), 2);
            output += instructions[value];
        }

        document.getElementById('code').value = output;
    }

    document.getElementById("export").addEventListener("click", () => {
        const code = document.getElementById("code").value;
        let bits = "";
        for (let i = 0; i < code.length; i++) {
            const value = instructions.indexOf(code[i]);
            if (value !== -1) {
                bits += value.toString(2).padStart(3, "0");
            }
        }

        bits += "0".repeat((8 - bits.length % 8) % 8);

        let binary = "";
        for (let i = 0; i + 7 < bits.length; i += 8) {
            const byte = bits.slice(i, i + 8);
            binary += String.fromCharCode(parseInt(byte, 2));
        }

        const base64 = btoa(binary);
        const url = new URL(window.location.href);
        url.searchParams.set("code", base64);
        window.history.replaceState({}, document.title, url.pathname + url.search + url.hash);
    });
</script>
<script type="module" src="./runner.js"></script>
</body>
</html>
