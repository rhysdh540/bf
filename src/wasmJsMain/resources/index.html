<!doctype html>
<html lang="en">
<head>
    <title>bf</title>
    <style>textarea { width: 100%; }</style>
</head>
<body>
<textarea id="code" rows="10">++++++++++[>+++++++>++++++++++>+++>+<<<<-]>++.>+.+++++++..+++.>++.<<+++++++++++++++.>.+++.------.--------.>+.>.</textarea>
<br/>
<button id="run">Run</button>
<label><input id="optimise" type="checkbox" checked/> Optimise</label>
<label><input id="strip" type="checkbox" checked/> Strip</label>
<br/>
<textarea id="output" rows="40" readonly style="width: 100%"></textarea>
<small id="time"></small>
<script type="module">
    const codeEl = document.getElementById('code');
    const optimiseEl = document.getElementById('optimise');
    const stripEl = document.getElementById('strip');
    const outputEl = document.getElementById('output');
    const runBtn = document.getElementById('run');
    const timeEl = document.getElementById('time');

    // language=js
    const workerSource = `
        self.onmessage = async (event) => {
            const { instantiateUrl, code, optimise, strip } = event.data;

            const binaryenUrl = "https://cdn.jsdelivr.net/npm/binaryen@116.0.0/index.js";
            const binaryenNs = await import(binaryenUrl); // namespace with .default

            try {
                const { instantiate } = await import(instantiateUrl);
                const { exports } = await instantiate({
                    bf: {
                        read: () => -1,
                        write: (v) => self.postMessage({ type: "out", byte: v & 0xff }),
                        flush: () => self.postMessage({ type: "flush" })
                    },
                    binaryen: binaryenNs
                });

                exports.run(code, !!optimise, !!strip);
                self.postMessage({ type: "done" });
            } catch (err) {
                self.postMessage({
                    type: "error",
                    message: err && err.message ? err.message : String(err)
                });
            }
        };
    `;

    const workerUrl = URL.createObjectURL(
        new Blob([workerSource], { type: "text/javascript" })
    );

    let worker = null;

    function stopWorker() {
        if (worker) {
            worker.terminate();
            worker = null;
        }
    }

    let startTime = 0;
    runBtn.addEventListener('click', () => {
        stopWorker();

        outputEl.value = "";
        runBtn.disabled = true;

        worker = new Worker(workerUrl, { type: "module" });
        worker.onmessage = (event) => {
            const msg = event.data;
            if (msg.type === "out") {
                outputEl.value += String.fromCharCode(msg.byte);
                outputEl.scrollTop = outputEl.scrollHeight;
                return;
            }

            if (msg.type === "done") {
                runBtn.disabled = false;
                stopWorker();
                const endTime = performance.now();
                timeEl.textContent = `Execution time: ${(endTime - startTime).toFixed(2)} ms`;
                return;
            }

            if (msg.type === "error") {
                if (outputEl.value.length !== 0 && !outputEl.value.endsWith('\n')) {
                    outputEl.value += "\n";
                }
                outputEl.value += `[worker error] ${msg.message}\n`;
                runBtn.disabled = false;
                stopWorker();
            }
        };

        startTime = performance.now();
        worker.postMessage({
            instantiateUrl: new URL("./bf.uninstantiated.mjs", import.meta.url).href,
            code: codeEl.value,
            optimise: optimiseEl.checked,
            strip: stripEl.checked
        });
    });

    window.addEventListener("beforeunload", () => {
        stopWorker();
        URL.revokeObjectURL(workerUrl);
    });
</script>
</body>
</html>
